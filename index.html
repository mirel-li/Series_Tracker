<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Series Watchlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF0F7;
    --bg-soft:#FFFFFF;
    --card:#FFFFFF;
    --red:#E0264D;
    --red-soft:#C4204A;
    --ink:#211F33;
    --text:#211F33;
    --text-dim:#6E6B85;
    --accent:#6C4EE8;
    --green:#1FAE6E;
    --line:#DEDEEC;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Montserrat',sans-serif;
    background:
      radial-gradient(circle at 12% 0%, rgba(224,38,77,0.08) 0%, transparent 40%),
      radial-gradient(circle at 88% 15%, rgba(108,78,232,0.10) 0%, transparent 42%),
      var(--bg);
    color:var(--text);
    padding:28px 16px 90px;
    min-height:100vh;
    overflow-x:hidden;
  }
  .wrap{max-width:1080px;margin:0 auto;}

  .hero{text-align:center;margin-bottom:26px;}
  .hero .eyebrow{
    font-size:11px;font-weight:700;letter-spacing:4px;
    color:var(--red);text-transform:uppercase;margin-bottom:6px;
  }
  .hero h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(38px,8vw,64px);
    margin:0 0 6px;
    letter-spacing:2px;
    color:var(--ink);
  }
  .hero p{font-size:14px;font-weight:500;color:var(--text-dim);margin:0;}

  .progress-card{
    background:var(--bg-soft);
    border-radius:18px;
    padding:14px 20px;
    margin:22px auto 28px;
    max-width:460px;
    border:1px solid var(--line);
    box-shadow:0 6px 18px rgba(33,31,51,0.06);
  }
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .progress-top .label{font-weight:700;color:var(--red);font-size:12px;letter-spacing:1px;}
  .progress-top .count{font-weight:700;color:var(--ink);font-size:13px;}
  .bar-track{height:8px;border-radius:8px;background:var(--line);overflow:hidden;}
  .bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--accent),var(--red));width:0%;transition:width .5s ease;}

  .filters{display:flex;flex-direction:column;gap:14px;margin-bottom:30px;}
  .filter-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
  .filter-row .row-label{
    width:100%;text-align:center;font-size:11px;font-weight:700;
    color:var(--text-dim);letter-spacing:2px;margin-bottom:2px;text-transform:uppercase;
  }
  .chip{
    border:1.5px solid var(--line);
    cursor:pointer;
    font-family:'Montserrat',sans-serif;
    font-weight:600;font-size:12.5px;
    padding:7px 16px;border-radius:999px;
    background:#fff;
    color:var(--ink);
    transition:all .15s ease;
  }
  .chip:hover{background:#F4F2FF;border-color:#CFC6FA;}
  .chip.active{background:var(--red);border-color:var(--red);color:#fff;}
  .chip.active.genre-active{background:var(--accent);border-color:var(--accent);}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:16px;
  }
  .empty-msg{text-align:center;font-weight:600;color:var(--text-dim);padding:50px 0;grid-column:1/-1;}

  .card{
    position:relative;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    aspect-ratio:2/3;
    background:var(--card);
    border:1px solid var(--line);
    box-shadow:0 6px 16px rgba(33,31,51,0.08);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .card:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 14px 26px rgba(33,31,51,0.16);}
  .card img{
    width:100%;height:100%;object-fit:cover;display:block;
    transition:filter .2s ease, opacity .2s ease;
  }
  .card .placeholder{
    width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#7C5CFC,#E0264D 130%);
  }
  .card .placeholder::before{
    content:"🎬";
    font-size:34px;
    opacity:.75;
    filter:grayscale(1) brightness(2.2);
  }
  .card .overlay-grad{
    position:absolute;left:0;right:0;bottom:0;height:62%;
    background:linear-gradient(to top, rgba(20,18,32,0.96) 0%, rgba(20,18,32,0.7) 40%, transparent 100%);
    pointer-events:none;
  }
  .card .info{position:absolute;left:0;right:0;bottom:0;padding:10px 9px;}
  .card .title{
    font-weight:700;font-size:12.5px;line-height:1.25;color:#fff;margin-bottom:5px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .card .tags{display:flex;gap:4px;flex-wrap:wrap;}
  .tag{font-size:8.5px;font-weight:700;padding:2px 7px;border-radius:999px;letter-spacing:.3px;text-transform:uppercase;}
  .tag.cat-ru{background:#FFD9B8;color:#7A360D;}
  .tag.cat-foreign{background:#C9E8FF;color:#0D4A73;}
  .tag.genre{background:#E3DBFF;color:#4326A8;}

  .card.watched img{filter:grayscale(.4) brightness(.7);}
  .card.watched{border-color:var(--green);}
  .card .watched-badge{
    position:absolute;top:8px;right:8px;width:24px;height:24px;
    background:var(--green);border-radius:50%;display:none;
    align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800;
    box-shadow:0 2px 6px rgba(0,0,0,0.25);
  }
  .card.watched .watched-badge{display:flex;}

  .overlay{
    position:fixed;inset:0;background:rgba(33,31,51,0.45);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:20px;z-index:50;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--bg-soft);border-radius:20px;max-width:760px;width:100%;
    max-height:88vh;overflow-y:auto;display:flex;
    box-shadow:0 30px 60px rgba(33,31,51,0.3);animation:pop .18s ease;
    border:1px solid var(--line);
  }
  @keyframes pop{from{transform:scale(.94);opacity:0;}to{transform:scale(1);opacity:1;}}
  .modal-cover{flex:0 0 42%;min-height:260px;background:#F4F2FF;position:relative;}
  .modal-cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .modal-cover .placeholder{
    width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#7C5CFC,#E0264D 130%);
  }
  .modal-cover .placeholder::before{
    content:"🎬";
    font-size:48px;
    opacity:.75;
    filter:grayscale(1) brightness(2.2);
  }
  .modal-body{flex:1;padding:26px 26px 24px;min-width:0;position:relative;}
  .modal .close-btn{
    position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;
    border:none;background:var(--bg);color:var(--ink);font-weight:800;font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;z-index:2;
  }
  .modal h2{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;margin:0 0 10px;padding-right:30px;color:var(--ink);}
  .modal .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  .modal .duration{font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:14px;}
  .modal .description{font-size:14px;line-height:1.6;color:#454259;margin-bottom:22px;}
  .modal .watch-btn{
    border:none;width:100%;padding:13px;border-radius:10px;
    font-family:'Montserrat',sans-serif;font-weight:700;font-size:14px;cursor:pointer;
    background:var(--red);color:#fff;transition:background .15s ease;
  }
  .modal .watch-btn.is-watched{background:var(--green);}

  footer{text-align:center;font-size:11px;color:var(--text-dim);margin-top:44px;font-weight:600;}

  @media (max-width:520px){
    .grid{grid-template-columns:repeat(3,1fr);}
    .modal{flex-direction:column;max-height:92vh;}
    .modal-cover{flex:0 0 220px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="eyebrow">My Collection</div>
    <h1>SERIES WATCHLIST</h1>
    <p>отмечай просмотренные сериалы</p>
  </div>

  <div class="progress-card">
    <div class="progress-top">
      <span class="label">ПРОГРЕСС</span>
      <span class="count"><span id="checkedCount">0</span> / <span id="totalCount">0</span></span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
  </div>

  <div class="filters">
    <div class="filter-row" id="catFilters"></div>
    <div class="filter-row" id="genreFilters"></div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>сделано с любовью к сериалам</footer>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-cover" id="mCover"></div>
    <div class="modal-body">
      <button class="close-btn" id="closeBtn">✕</button>
      <h2 id="mTitle"></h2>
      <div class="tags" id="mTags"></div>
      <div class="duration" id="mDuration"></div>
      <div class="description" id="mDescription"></div>
      <button class="watch-btn" id="watchBtn">Отметить как просмотрено</button>
    </div>
  </div>
</div>

<script>
/* =========================================================
   ШАБЛОН ДЛЯ ЗАПОЛНЕНИЯ
   Копируй блок { ... } и меняй значения.

   id        — уникальный текстовый идентификатор (без пробелов)
   title     — название сериала
   cover     — ссылка (URL) на картинку обложки.
               Если оставить пустым "" — покажется цветная заглушка с названием.
   category  — 'ru' (российский) или 'foreign' (иностранный)
   genre     — жанр (любое слово, фильтры построятся сами)
   duration  — длительность, например "50 мин · 2 сезона"
   description — краткое описание сериала
========================================================= */

const seriesData = [
   { id:"13-reasons-why", title:"13 причин почему", cover:"https://avatars.mds.yandex.net/get-kinopoisk-image/1599028/3526e6b5-5888-4b8b-8ae0-e01d5c50a7cd/2560x2560?webp=true", category:"foreign", genre:"Драма",
    duration:"55 мин · 4 сезона", description:"Школьник Клэй получает плёнки от погибшей одноклассницы Ханны, которая рассказывает 13 причин, приведших её к трагическому решению. Сериал поднимает тяжёлые темы травли и подросткового суицида." },
  { id:"umbrella-academy", title:"Академия «Амбрелла»", cover:"https://avatars.mds.yandex.net/get-kinopoisk-image/1900788/29014afb-fd4c-419d-9714-1263788cc81b/2560x2560?webp=true", category:"foreign", genre:"Фантастика",
    duration:"50 мин · 4 сезона", description:"Семеро приёмных детей с суперспособностями, давно не разговаривающих друг с другом, собираются вместе после смерти отца и пытаются разобраться, кто убил его и почему скоро наступит конец света." },
   { id:"ahs", title:"Американская история ужасов", cover:"https://avatars.mds.yandex.net/get-kinopoisk-image/1629390/4e1e6a26-a18e-4a4f-9fb2-8a032bdc0d1f/2560x2560?webp=true", category:"foreign", genre:"Ужасы",
    duration:"50 мин · 12 сезонов", description:"Антология ужасов, где каждый сезон — новая самостоятельная история: проклятый дом, психиатрическая лечебница, ковен ведьм, цирк уродов, отель с привидениями и многое другое." },
  { id:"bar-odin-zvonok", title:"Бар «Один звонок»", cover:"https://avatars.mds.yandex.net/get-kinopoisk-image/10592371/4a466b66-d8b5-4ce0-9adb-a4f2f9036b4e/2560x2560?webp=true", category:"ru", genre:"Мистика",
    duration:"45 мин · 1 сезон", description:"Детектив ищет пропавшего сына и выходит на след загадочного бара, где люди играют в русскую рулетку за шанс поговорить с умершими близкими." },
  { id:"barry", title:"Барри", cover:"https://avatars.mds.yandex.net/get-kinopoisk-image/1898899/ec0241e7-767e-4936-83fa-568147c23984/2560x2560?webp=true", category:"foreign", genre:"Чёрная комедия",
    duration:"30 мин · 4 сезона", description:"Бывший морпех и наёмный убийца Барри отправляется на заказ в Лос-Анджелес — и неожиданно для себя увлекается актёрским мастерством, пытаясь совмещать новую страсть со старой кровавой профессией." },
  { id:"bibliotekar", title:"Библиотекарь", cover:"https://avatars.mds.yandex.net/get-kinopoisk-image/4483445/83a1e8e6-3bf5-400b-8516-ac4d4a0326e4/2560x2560?webp=true ", category:"ru", genre:"Фэнтези",
    duration:"52 мин · 1 сезон", description:"Главный герой Алексей Вязинцев (актер-неудачник) узнает, что его незадолго до этого убитый отец был «Библиотекарем». В мире сериала существуют редкие книги советского писателя Громова, которые обладают магической силой. Каждая книга дает особый эффект (Ярость, Память, Терпение, Власть и т.д.), если читать ее при соблюдении строгих правил. За право владеть этими книгами ведут жестокую и кровавую войну тайные группы — «Библиотеки»." }, // обложка: https://www.kinopoisk.ru/index.php?kp_query=Библиотекарь%20сериал
  { id:"bridgerton", title:"Бриджертоны", cover:"https://avatars.mds.yandex.net/get-kinopoisk-image/10900341/e6b3f259-ae23-4951-acc3-7502c520a0d8/2560x2560?webp=true", category:"foreign", genre:"Историческая драма",
    duration:"60 мин · 4 сезона", description:"Восемь братьев и сестёр из аристократического семейства Бриджертон ищут любовь на конкурентном «рынке невест» лондонского высшего света — и каждый сезон попадает на острый язычок анонимной светской хроникёрши леди Уислдаун." },
  { id:"big-little-lies", title:"Большая маленькая ложь", cover:"https://avatars.mds.yandex.net/get-kinopoisk-image/1599028/ffb8fd33-76f9-4f93-97eb-f6948d2d0a06/2560x2560?webp=true", category:"foreign", genre:"Драма",
    duration:"50 мин · 2 сезона", description:"Идеальные на первый взгляд жизни матерей из элитного калифорнийского городка рушатся, когда за их секретами начинают тянуться ниточки, ведущие к убийству." },
  { id:"money-heist", title:"Бумажный дом", cover:"https://avatars.mds.yandex.net/get-kinopoisk-image/6201401/8472ca52-2751-4bbe-9a08-8a1be75f93d5/2560x2560?webp=true", category:"foreign", genre:"Криминал",

  { id:"buhta-vdov", title:"Бухта вдов", cover:"https://avatars.mds.yandex.net/get-kinopoisk-image/10900341/23cf9bd0-80ab-46ab-ab0c-574e99558760/2560x2560?webp=true", category:"foreign", genre:"Хоррор",

    duration:"50 мин · 1 сезон", description:"Лето 1940 года, выпускной бал в провинциальном Двинске. Четыре близкие подруги строят планы на будущее — любовь, замужество, мечты — ещё не зная, что совсем скоро всё перевернёт война." },
  { id:"witcher", title:"Ведьмак", cover:"https://avatars.mds.yandex.net/get-kinopoisk-image/4774061/5600c5ab-6299-470b-97a9-6a22d9c80bfb/2560x2560?webp=true", category:"foreign", genre:"Фэнтези",
    duration:"60 мин · 3 сезона", description:"Охотник на монстров Геральт из Ривии пробирается через политику, магию и судьбу в мрачном фэнтези-мире по книгам Сапковского." }, // обложка: https://www.kinopoisk.ru/index.php?kp_query=Ведьмак%20сериал
   { id:"breaking-bad", title:"Во все тяжкие", cover:"https://avatars.mds.yandex.net/get-kinopoisk-image/1773646/2401718d-3f27-4bc1-9fcc-899c3355cd4f/2560x2560?webp=true", category:"foreign", genre:"Криминал",

  { id:"vne-kampusa", title:"Вне кампуса", cover:"https://avatars.mds.yandex.net/get-kinopoisk-image/10953618/423b4d59-2a2b-48db-82c6-b97ae0d2fa8f/2560x2560?webp=true", category:"foreign", genre:"Молодёжная драма",

    duration:"45 мин · 1 сезон", description:"Бывший заключённый возвращается домой после 20 лет за решёткой и пытается заново выстроить отношения с дочерью. Трогательная драмеди с Гошей Куценко." }, // обложка: https://www.kinopoisk.ru/index.php?kp_query=Встать%20на%20ноги%20сериал
  { id:"vybivshaya", title:"Выбывшая", cover:"https://avatars.mds.yandex.net/get-kinopoisk-image/4303601/3c756cb6-4759-4a4a-b108-85ccbaaf08d0/2560x2560?webp=true", category:"foreign", genre:"Драма",

  { id:"godunov", title:"Годунов", cover:"https://avatars.mds.yandex.net/get-kinopoisk-image/1946459/27112e5f-b7b4-457d-9586-1ddb3f963377/2560x2560?webp=true", category:"ru", genre:"Историческая драма",
    duration:"52 мин · 2 сезона", description:"От последних дней правления Ивана Грозного до Смутного времени и восшествия на престол Романовых — история взлёта и трагического падения Бориса Годунова, первого избранного царя на Руси." },

    duration:"45 мин · 3 сезона", description:"Сирота Энн Шерли попадает в приёмную семью на острове Принца Эдуарда и своей фантазией и упорством меняет жизнь окружающих. Тёплая экранизация классики Л. М. Монтгомери." }, // обложка: https://www.kinopoisk.ru/index.php?kp_query=Энн%20сериал%20Anne%20with%20an%20E,
  { id:"i-will-find-you", title:"Я тебя отыщу", cover:"https://avatars.mds.yandex.net/get-kinopoisk-image/10853012/fe65ef13-5b97-422b-b071-04fcdd4a92a8/2560x2560?webp=true", category:"foreign", genre:"Триллер",
    duration:"45 мин · 1 сезон", description:"Отца несправедливо осудили за убийство собственного сына — и когда он узнаёт, что мальчик может быть жив, начинает отчаянные поиски, чтобы спасти его и доказать свою невиновность." },
  ];

/* ========================================================= */

const STORAGE_KEY = 'seriesChecklistWatched';
let activeCategory = 'all';
let activeGenre = 'all';

function getWatched(){
  try{ return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); }
  catch(e){ return new Set(); }
}
function saveWatched(set){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(set))); }catch(e){}
}
let watched = getWatched();

function escAttr(str){
  return String(str).replace(/'/g, "\\'").replace(/"/g,'&quot;');
}

function coverHTML(s){
  if(s.cover && s.cover.trim() !== ""){
    return `<img src="${s.cover}" alt="${escAttr(s.title)}" loading="lazy"
      onerror="this.outerHTML='<div class=&quot;placeholder&quot;></div>'">`;
  }
  return `<div class="placeholder"></div>`;
}

function renderCatFilters(){
  const cats = [
    {key:'all', label:'Все'},
    {key:'ru', label:'🇷🇺 Российские'},
    {key:'foreign', label:'🌍 Иностранные'}
  ];
  const el = document.getElementById('catFilters');
  el.innerHTML = `<div class="row-label">Категория</div>` + cats.map(c =>
    `<button class="chip ${activeCategory===c.key?'active':''}" data-cat="${c.key}">${c.label}</button>`
  ).join('');
}

function renderGenreFilters(){
  const genres = Array.from(new Set(seriesData.map(s=>s.genre))).sort();
  const el = document.getElementById('genreFilters');
  el.innerHTML = `<div class="row-label">Жанр</div>` +
    `<button class="chip ${activeGenre==='all'?'active genre-active':''}" data-genre="all">Все жанры</button>` +
    genres.map(g =>
      `<button class="chip ${activeGenre===g?'active genre-active':''}" data-genre="${g}">${g}</button>`
    ).join('');
}

function renderGrid(){
  const grid = document.getElementById('grid');
  const filtered = seriesData.filter(s =>
    (activeCategory==='all' || s.category===activeCategory) &&
    (activeGenre==='all' || s.genre===activeGenre)
  );
  if(filtered.length===0){
    grid.innerHTML = `<div class="empty-msg">Ничего не найдено</div>`;
    return;
  }
  grid.innerHTML = filtered.map(s => `
    <div class="card ${watched.has(s.id)?'watched':''}" data-id="${s.id}">
      ${coverHTML(s)}
      <div class="watched-badge">✓</div>
      <div class="overlay-grad"></div>
      <div class="info">
        <div class="title">${s.title}</div>
        <div class="tags">
          <span class="tag ${s.category==='ru'?'cat-ru':'cat-foreign'}">${s.category==='ru'?'RU':'INTL'}</span>
          <span class="tag genre">${s.genre}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function updateProgress(){
  document.getElementById('totalCount').textContent = seriesData.length;
  document.getElementById('checkedCount').textContent = watched.size;
  const pct = seriesData.length ? (watched.size/seriesData.length*100) : 0;
  document.getElementById('barFill').style.width = pct + '%';
}

const overlay = document.getElementById('overlay');
let currentId = null;

function openModal(id){
  const s = seriesData.find(x=>x.id===id);
  if(!s) return;
  currentId = id;
  document.getElementById('mCover').innerHTML = coverHTML(s);
  document.getElementById('mTitle').textContent = s.title;
  document.getElementById('mTags').innerHTML = `
    <span class="tag ${s.category==='ru'?'cat-ru':'cat-foreign'}">${s.category==='ru'?'Российский':'Иностранный'}</span>
    <span class="tag genre">${s.genre}</span>
  `;
  document.getElementById('mDuration').textContent = s.duration;
  document.getElementById('mDescription').textContent = s.description;
  const btn = document.getElementById('watchBtn');
  setWatchBtn(btn, watched.has(id));
  overlay.classList.add('open');
}

function setWatchBtn(btn, isWatched){
  btn.classList.toggle('is-watched', isWatched);
  btn.textContent = isWatched ? '✓ Просмотрено' : 'Отметить как просмотрено';
}

function closeModal(){
  overlay.classList.remove('open');
  currentId = null;
}

document.getElementById('closeBtn').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });

document.getElementById('watchBtn').addEventListener('click', () => {
  if(!currentId) return;
  if(watched.has(currentId)) watched.delete(currentId);
  else watched.add(currentId);
  saveWatched(watched);
  setWatchBtn(document.getElementById('watchBtn'), watched.has(currentId));
  renderGrid();
  updateProgress();
});

document.getElementById('grid').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if(card) openModal(card.dataset.id);
});

document.getElementById('catFilters').addEventListener('click', e => {
  const btn = e.target.closest('.chip');
  if(!btn) return;
  activeCategory = btn.dataset.cat;
  renderCatFilters();
  renderGrid();
});

document.getElementById('genreFilters').addEventListener('click', e => {
  const btn = e.target.closest('.chip');
  if(!btn) return;
  activeGenre = btn.dataset.genre;
  renderGenreFilters();
  renderGrid();
});

renderCatFilters();
renderGenreFilters();
renderGrid();
updateProgress();
</script>
</body>
</html>
